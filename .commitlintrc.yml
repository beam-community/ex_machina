# This file is synced with beam-community/common-config. Any changes will be overwritten.

extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
  subject-case:
    - 0
  header-max-length:
    - 2
    - always
    - 100
